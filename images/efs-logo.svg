<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" role="img" aria-label="EFS — Établissement Français du Sang · Du donneur aux patients">
  <defs>
    <!-- Police cursive simulée via path pour la signature -->
    <style>
      .efs-circle   { fill: none; stroke: #1A2C72; stroke-width: 8; }
      .efs-arc      { fill: none; stroke: #1A2C72; stroke-width: 9; stroke-linecap: round; }
      .efs-letters  { font-family: 'Georgia', 'Times New Roman', serif; font-weight: 700; font-size: 108px; fill: #1A2C72; letter-spacing: 6px; }
      .efs-subtitle { font-family: 'Arial', 'Helvetica', sans-serif; font-weight: 700; font-size: 22px; fill: #1A2C72; letter-spacing: 2.5px; }
      .efs-script   { font-family: 'Georgia', 'Times New Roman', serif; font-style: italic; font-size: 44px; fill: #D81921; }
      .efs-line     { stroke: #D81921; stroke-width: 2.5; }
      .efs-tri      { fill: #D81921; }
    </style>
  </defs>

  <!-- Cercle extérieur -->
  <circle cx="250" cy="250" r="238" class="efs-circle"/>

  <!-- Arc supérieur (demi-cercle intérieur) -->
  <path d="M 108,230 A 148,148 0 0,1 392,230" class="efs-arc"/>

  <!-- Triangles rouges aux extrémités de l'arc -->
  <!-- Gauche : triangle pointe en haut -->
  <polygon points="108,238 100,258 116,258" class="efs-tri"/>
  <!-- Droite : triangle pointe en bas -->
  <polygon points="392,222 384,242 400,242" class="efs-tri"/>

  <!-- Lettres EFS -->
  <text x="250" y="218" text-anchor="middle" class="efs-letters">EFS</text>

  <!-- Ligne séparatrice rouge double -->
  <line x1="72" y1="298" x2="428" y2="298" class="efs-line"/>
  <line x1="72" y1="304" x2="428" y2="304" class="efs-line"/>

  <!-- ÉTABLISSEMENT FRANÇAIS DU SANG -->
  <text x="250" y="288" text-anchor="middle" class="efs-subtitle">ÉTABLISSEMENT FRANÇAIS DU SANG</text>

  <!-- Signature cursive "Du donneur aux patients" -->
  <!-- Ligne 1 -->
  <text x="250" y="366" text-anchor="middle" class="efs-script">Du donneur</text>
  <!-- Ligne 2 -->
  <text x="250" y="420" text-anchor="middle" class="efs-script">aux patients</text>
</svg>
