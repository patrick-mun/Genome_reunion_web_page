<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" role="img" aria-label="EFS — Établissement Français du Sang · Du donneur aux patients">
  <style>
    .bg  { fill: white; stroke: #1B2D72; stroke-width: 7; }
    .arc { fill: none; stroke: #1B2D72; stroke-width: 9; stroke-linecap: butt; }
    .efs { font-family: 'Georgia', 'Times New Roman', serif; font-weight: bold; font-size: 108px; fill: #1B2D72; }
    .sub { font-family: 'Arial Narrow', Arial, Helvetica, sans-serif; font-weight: bold; font-size: 16.5px; fill: #1B2D72; letter-spacing: 1px; }
    .ln  { stroke: #D0011B; stroke-width: 2; }
    .tri { fill: #D0011B; }
    .sig { font-family: 'Georgia', 'Times New Roman', serif; font-style: italic; font-size: 50px; fill: #D0011B; }
  </style>

  <!-- Fond blanc + cercle bleu -->
  <circle cx="250" cy="250" r="238" class="bg"/>

  <!-- Arc supérieur : de (88,248) à (412,248), centre (250,248), r=162 → sommet à (250,86) -->
  <path d="M 88,248 A 162,162 0 0,1 412,248" class="arc"/>

  <!-- Triangle gauche ▲ (pointe vers le haut, sous extrémité gauche de l'arc) -->
  <polygon points="88,237  79,256  97,256" class="tri"/>

  <!-- Triangle droit ▼ (pointe vers le bas, sous extrémité droite de l'arc) -->
  <polygon points="412,256  403,237  421,237" class="tri"/>

  <!-- EFS — centré dans l'arc -->
  <text x="250" y="222" text-anchor="middle" class="efs">EFS</text>

  <!-- ÉTABLISSEMENT FRANÇAIS DU SANG -->
  <text x="250" y="276" text-anchor="middle" class="sub">ÉTABLISSEMENT FRANÇAIS DU SANG</text>

  <!-- Double ligne rouge -->
  <line x1="68" y1="287" x2="432" y2="287" class="ln"/>
  <line x1="68" y1="294" x2="432" y2="294" class="ln"/>

  <!-- Signature cursive -->
  <text x="250" y="363" text-anchor="middle" class="sig">Du donneur</text>
  <text x="250" y="423" text-anchor="middle" class="sig">aux patients</text>
</svg>
